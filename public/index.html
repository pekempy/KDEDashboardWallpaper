<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLaDOS Dashboard</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Dynamic Background -->
  <div id="bg-layer" class="bg-layer"></div>
  <div class="bg-overlay"></div>

  <div class="app-container">
    
    <!-- Top Navigation / Header -->
    <header class="glass-header">
      <div class="header-left">
        <div class="logo">
          <i data-lucide="cpu" class="text-accent"></i>
          <span class="logo-text">GLaDOS</span>
        </div>
        <div class="status-badge" id="server-status">
          <span class="dot pulse"></span> Online
        </div>
      </div>
      
      <div class="header-center">
        <div class="clock-display" id="clock-display">00:00</div>
        <div class="date-display" id="date-display">Monday, January 1</div>
      </div>

      <div class="header-right">
        <div class="search-box">
          <i data-lucide="search"></i>
          <input type="text" id="global-search" placeholder="Search system..." autocomplete="off">
        </div>
        <button class="icon-btn" id="btn-wallpaper" title="New Wallpaper">
          <i data-lucide="image"></i>
        </button>
        <button class="icon-btn" id="btn-edit-mode" title="Toggle Edit Mode">
          <i data-lucide="settings"></i>
        </button>
      </div>
    </header>

    <!-- Main Content Layout -->
    <main class="dashboard-layout">
      
      <!-- Left Sidebar (Widgets) -->
      <aside class="sidebar">
        
        <!-- System Vitals -->
        <div class="glass-card widget widget-vitals">
          <div class="widget-header">
            <h3><i data-lucide="activity"></i> System Vitals</h3>
            <span class="uptime" id="uptime-display">00:00:00 up</span>
          </div>
          <div class="vitals-grid">
            <div class="vital-item">
              <div class="vital-label">CPU</div>
              <div class="progress-track"><div class="progress-fill" id="cpu-bar"></div></div>
              <div class="vital-val" id="cpu-val">0%</div>
            </div>
            <div class="vital-item">
              <div class="vital-label">RAM</div>
              <div class="progress-track"><div class="progress-fill" id="ram-bar"></div></div>
              <div class="vital-val" id="ram-val">0%</div>
            </div>
          </div>
          <div class="disk-vitals" id="disk-vitals">
            <!-- Dynamic Disks -->
          </div>
          <div class="widget-actions">
            <button class="btn btn-sm btn-ghost" onclick="app.launchKonsole()"><i data-lucide="terminal"></i> Terminal</button>
            <button class="btn btn-sm btn-ghost" onclick="app.launchUpdate()"><i data-lucide="refresh-cw"></i> Update</button>
          </div>
        </div>

        <!-- Bookmarks -->
        <div class="glass-card widget widget-links">
          <div class="widget-header">
            <h3><i data-lucide="bookmark"></i> Bookmarks</h3>
            <button class="icon-btn-sm edit-only" onclick="app.addBookmark()"><i data-lucide="plus"></i></button>
          </div>
          <div class="links-grid" id="bookmarks-grid">
            <!-- Dynamic Bookmarks -->
          </div>
        </div>

        <!-- Folder Shortcuts -->
        <div class="glass-card widget widget-links">
          <div class="widget-header">
            <h3><i data-lucide="folder"></i> Folders</h3>
            <button class="icon-btn-sm edit-only" onclick="app.addFolder()"><i data-lucide="plus"></i></button>
          </div>
          <div class="links-grid" id="folders-grid">
            <!-- Dynamic Folders -->
          </div>
        </div>
      </aside>

      <!-- Main Hub (Projects & Docker) -->
      <section class="main-hub">
        <div class="glass-card hub-container">
          <div class="hub-header">
            <div class="tabs" id="main-tabs">
              <button class="tab active" data-tab="projects"><i data-lucide="code"></i> Projects</button>
              <button class="tab" data-tab="docker"><i data-lucide="box"></i> Containers</button>
            </div>
            <div class="filters" id="category-filters">
              <!-- Dynamic Categories -->
            </div>
          </div>
          
          <div class="hub-grid" id="projects-grid">
            <!-- Dynamic Project Cards -->
          </div>
        </div>
      </section>
    </main>
    
    <!-- Logs Drawer -->
    <div class="logs-drawer" id="logs-drawer">
      <div class="logs-header">
        <div class="logs-title">
          <i data-lucide="terminal"></i> <span id="logs-title-text">Service Logs</span>
        </div>
        <div class="logs-actions">
          <button class="icon-btn-sm" id="btn-clear-logs"><i data-lucide="trash-2"></i></button>
          <button class="icon-btn-sm" onclick="document.getElementById('logs-drawer').classList.remove('open')"><i data-lucide="x"></i></button>
        </div>
      </div>
      <div class="logs-body" id="logs-output"></div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
      <div class="glass-card modal">
        <div class="modal-header">
          <h3 id="modal-title">Edit Item</h3>
          <button class="icon-btn-sm" onclick="app.closeModal()"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="edit-name" class="input-modern">
          </div>
          <div class="form-group">
            <label>Path / URL</label>
            <input type="text" id="edit-path" class="input-modern">
          </div>
          <div class="form-group">
            <label>Icon (Lucide name or URL)</label>
            <input type="text" id="edit-icon" class="input-modern">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="app.closeModal()">Cancel</button>
          <button class="btn btn-primary" id="btn-save-edit">Save Changes</button>
        </div>
      </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast">Message</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
